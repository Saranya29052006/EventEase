<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EventEase - Booking Confirmed</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎟️</text></svg>">
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">Event<span>Ease</span></div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a id="adminLink" href="admin.html" style="display:none">Admin</a>
      <a id="loginLink" href="login.html">Login</a>
      <a id="registerLink" href="register.html">Register</a>
      <a id="logoutLink" href="#" style="display:none" onclick="logout()">Logout</a>
    </div>
  </nav>

  <!-- CONFIRMATION -->
  <div class="confirmation-card">
    <div class="icon">🎉</div>
    <h2>Booking Confirmed!</h2>
    <p style="color:var(--text-muted)">Your tickets have been booked successfully</p>

    <div class="booking-details" id="bookingDetails">
      <!-- Details load here -->
    </div>

    <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="window.location.href='mybookings.html'">
        My Bookings
      </button>
      <button class="btn btn-outline" onclick="window.location.href='index.html'">
        Browse More Events
      </button>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/booking.js"></script>
</body>
</html>
