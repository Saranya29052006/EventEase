<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EventEase - Book Your Events</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎟️</text></svg>">
  <link rel="stylesheet" href="/css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">Event<span>Ease</span></div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="mybookings.html">My Bookings</a>
      <a id="adminLink" href="admin.html" style="display:none">Admin</a>
      <a id="loginLink" href="login.html">Login</a>
      <a id="registerLink" href="register.html">Register</a>
      <a id="logoutLink" href="#" style="display:none" onclick="logout()">Logout</a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <h1>Book Your Favorite <span>Events</span></h1>
    <p>Concerts, Sports, Conferences and more — all in one place</p>

    <!-- SEARCH -->
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="🔍 Search events..."/>
      <select id="categoryFilter">
        <option value="">All Categories</option>
        <option value="Concert">Concert</option>
        <option value="Sports">Sports</option>
        <option value="Conference">Conference</option>
        <option value="Theatre">Theatre</option>
        <option value="Festival">Festival</option>
        <option value="Other">Other</option>
      </select>
      <button class="btn btn-primary" onclick="filterEvents()">Search</button>
    </div>
  </section>

  <!-- EVENTS -->
  <div class="section">
    <h2 class="section-title">Upcoming Events</h2>
    <div class="events-grid" id="eventsGrid">
      <!-- Events will load here -->
    </div>
    <p id="noEvents" style="display:none; color:var(--text-muted); text-align:center; margin-top:2rem;">
      No events found.
    </p>
  </div>

  <!-- FOOTER -->
  <footer>
    <p>Made with <span>♥</span> by EventEase &copy; 2026</p>
  </footer>

  <script src="/js/auth.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
