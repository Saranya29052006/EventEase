<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EventEase - Event Details</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎟️</text></svg>">
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
  body { background: #0d1117; }

  .event-detail {
  max-width: 100%;
  margin: 1rem 2rem;
  padding: 0 5rem;
}

  .event-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 80vh;
    border: 0.5px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    overflow: hidden;
  }

  .event-left {
  padding: 24px;
  border-right: 0.5px solid rgba(255,255,255,0.07);
  display: flex;
  flex-direction: column;
  gap: 1.2rem;
  align-items: flex-start;
  height: fit-content;
}

  .img-wrapper {
  border-radius: 12px;
  overflow: hidden;
  padding: 8px;
  background: #161b22;
  border: 0.5px solid rgba(255,255,255,0.07);
}

.event-left img.banner {
  width: 100%;
  height: auto;
  object-fit: contain;
  border-radius: 8px;
  display: block;
}

  .event-title {
    font-size: 1.6rem;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    line-height: 1.3;
    margin: 0;
  }

  .event-desc {
    font-size: 0.9rem;
    color: rgba(255,255,255,0.50);
    line-height: 1.8;
    margin: 0;
  }

  .event-right {
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .meta-card {
  background: rgba(255,255,255,0.04);
  border: 0.5px solid rgba(255,255,255,0.07);
  border-radius: 10px;
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}

  .meta-card i {
    font-size: 0.95rem;
    color: #6c63ff;
    margin-bottom: 2px;
  }

  .meta-card .m-label {
    font-size: 10px;
    color: rgba(255,255,255,0.32);
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }

  .meta-card .m-value {
    font-size: 0.88rem;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
  }

  .right-divider {
    border: none;
    border-top: 0.5px solid rgba(255,255,255,0.07);
    margin-bottom: 20px;
  }

  .booking-label {
    font-size: 11px;
    color: rgba(255,255,255,0.32);
    text-transform: uppercase;
    letter-spacing: 0.7px;
    margin-bottom: 14px;
  }

  .ticket-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .ticket-name {
    font-size: 0.9rem;
    color: rgba(255,255,255,0.85);
    font-weight: 600;
  }

  .ticket-price {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.50);
    margin-top: 2px;
  }

  .qty-control {
    display: inline-flex;
    align-items: center;
    border: 0.5px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    overflow: hidden;
  }

  .qty-btn {
    width: 34px;
    height: 34px;
    background: #161b22;
    border: none;
    color: rgba(255,255,255,0.7);
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .qty-btn:hover {
    background: rgba(108,99,255,0.2);
    color: #a89fff;
  }

  .qty-num {
    width: 38px;
    text-align: center;
    font-size: 0.95rem;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    border-left: 0.5px solid rgba(255,255,255,0.10);
    border-right: 0.5px solid rgba(255,255,255,0.10);
    line-height: 34px;
    background: #0d1117;
  }

  .total-section {
    border-top: 0.5px solid rgba(255,255,255,0.07);
    padding-top: 16px;
    margin-top: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .total-label {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.50);
  }

  .total-amount {
    font-size: 1.3rem;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
  }

  .confirm-btn {
    width: 100%;
    padding: 0.85rem;
    background: #534AB7;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    letter-spacing: 0.3px;
  }

  .confirm-btn:hover { background: #4540a0; }

  @media (max-width: 768px) {
    .event-layout { grid-template-columns: 1fr; }
    .event-left { border-right: none; border-bottom: 0.5px solid rgba(255,255,255,0.07); }
  }
</style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">Event<span>Ease</span></div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a id="adminLink" href="admin.html" style="display:none">Admin</a>
      <a id="loginLink" href="login.html">Login</a>
      <a id="registerLink" href="register.html">Register</a>
      <a id="logoutLink" href="#" style="display:none" onclick="logout()">Logout</a>
    </div>
  </nav>

  <!-- EVENT DETAIL -->
  <div class="event-detail" id="eventDetail">
    <p style="color:var(--text-muted)">Loading event...</p>
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/event.js"></script>
</body>
</html>
