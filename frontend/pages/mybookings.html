<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EventEase - My Bookings</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎟️</text></svg>">
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">Event<span>Ease</span></div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="mybookings.html">My Bookings</a>
      <a id="adminLink" href="admin.html" style="display:none">Admin</a>
      <a id="loginLink" href="login.html">Login</a>
      <a id="registerLink" href="register.html">Register</a>
      <a id="logoutLink" href="#" style="display:none" onclick="logout()">Logout</a>
    </div>
  </nav>

  <div class="section">
    <h2 class="section-title">My Bookings</h2>
    <div class="table-container">
      <table id="bookingsTable">
        <thead>
          <tr>
            <th>Booking ID</th>
            <th>Event</th>
            <th>Date</th>
            <th>Tickets</th>
            <th>Total</th>
            <th>Details</th>
          </tr>
        </thead>
        <tbody id="bookingsBody">
          <!-- Bookings load here -->
        </tbody>
      </table>
    </div>
    <p id="noBookings" style="display:none;color:var(--text-muted);text-align:center;margin-top:2rem">
      You have no bookings yet. <a href="index.html" style="color:var(--primary)">Browse events</a>
    </p>
  </div>

  <!-- BOOKING DETAILS MODAL -->
  <div id="detailsModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:999;align-items:center;justify-content:center;">
    <div style="background:#16213e;border:0.5px solid rgba(255,255,255,0.1);border-radius:16px;padding:2rem;width:520px;max-width:90%;text-align:center;">
      <h3 style="color:rgba(255,255,255,0.85);margin-bottom:1.2rem">Event Details</h3>

      <div id="detailsContent" style="text-align:left;background:rgba(255,255,255,0.03);border:0.5px solid rgba(255,255,255,0.07);border-radius:12px;padding:1.2rem;margin-bottom:1.5rem">
      </div>

      <button class="btn btn-primary" style="width:100%;padding:0.8rem;border-radius:8px;cursor:pointer" onclick="closeDetailsModal()">Close</button>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/mybookings.js"></script>
</body>
