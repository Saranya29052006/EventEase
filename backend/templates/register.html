<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EventEase - Register</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎟️</text></svg>">
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo" onclick="window.location.href='/'" style="cursor:pointer">Event<span>Ease</span></div>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/login">Login</a>
      <a href="/register">Register</a>
    </div>
  </nav>

  <!-- REGISTER FORM -->
  <div class="form-container">
    <h2>Create Account 🎟️</h2>

    <div id="alert" class="alert" style="display:none"></div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Enter your full name"/>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="Enter your email"/>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Create a password"/>
    </div>

    <button class="btn btn-primary" style="width:100%" onclick="register()">
      Create Account
    </button>

    <div class="form-footer">
      Already have an account? <a href="/login">Login here</a>
    </div>
  </div>

  <script src="/static/js/register.js"></script>
</body>
</html>
